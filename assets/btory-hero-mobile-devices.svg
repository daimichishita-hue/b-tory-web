      <rect width="316" height="202" rx="34" fill="#fff" stroke="#161312" stroke-width="5"/>
      <text x="28" y="48" fill="#161312" font-family="Arial Black, Helvetica, sans-serif" font-size="25" font-weight="900">Low stock</text>
