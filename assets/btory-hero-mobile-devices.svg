      <text x="48" y="100" fill="#161312" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="800">OX 6%</text>
      <text x="228" y="101" fill="#FF2D73" font-family="Arial Black, Helvetica, sans-serif" font-size="21" font-weight="900">2</text>
      <text x="48" y="152" fill="#161312" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="800">Color 8N</text>
      <text x="228" y="153" fill="#FF2D73" font-family="Arial Black, Helvetica, sans-serif" font-size="21" font-weight="900">1</text>
    </g>

    <g transform="translate(546 608)">
