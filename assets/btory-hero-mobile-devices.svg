    <text x="112" y="56" fill="#fff" font-family="Arial Black, Helvetica, sans-serif" font-size="52" font-weight="900" letter-spacing="0">B-tory</text>
    <text x="116" y="91" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3" opacity=".86">SALON INVENTORY</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="118" y="256" width="840" height="640" rx="62" fill="#161312"/>
