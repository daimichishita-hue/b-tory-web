<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">B-tory app shown on phone and tablet screens</title>
  <desc id="desc">Premium gradient hero artwork with abstract tablet and phone mockups for B-tory salon inventory management.</desc>
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7438D7"/>
      <stop offset=".22" stop-color="#D725C8"/>
      <stop offset=".47" stop-color="#FF2D73"/>
      <stop offset=".72" stop-color="#FF623B"/>
      <stop offset="1" stop-color="#FFC154"/>
    </linearGradient>
    <radialGradient id="warm" cx=".48" cy=".58" r=".76">
      <stop offset="0" stop-color="#FFDA74" stop-opacity=".9"/>
      <stop offset=".34" stop-color="#FF8A3D" stop-opacity=".55"/>
      <stop offset=".7" stop-color="#FF2D73" stop-opacity=".22"/>
      <stop offset="1" stop-color="#7438D7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#FFF1E3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#161312" flood-opacity=".24"/>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#161312" flood-opacity=".14"/>
    </filter>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="3" fill="#fff" opacity=".18"/>
    </pattern>
  </defs>

  <rect width="1600" height="1200" rx="90" fill="url(#brand)"/>
  <rect width="1600" height="1200" rx="90" fill="url(#warm)"/>
  <rect width="1600" height="1200" rx="90" fill="url(#dots)" opacity=".72"/>
  <circle cx="190" cy="132" r="210" fill="#fff" opacity=".09"/>
  <circle cx="1385" cy="1040" r="260" fill="#fff" opacity=".1"/>
  <path d="M1128 58c184 70 292 206 326 386 33 177-67 275-160 331-116 71-261 75-397 15-101-44-173-117-207-207-49-128-14-278 90-388 88-94 210-177 348-137Z" fill="#fff" opacity=".1"/>
  <path d="M124 805c138-57 286-41 394 37 97 70 135 174 95 265-41 94-156 136-302 111-156-26-270-118-286-230-11-76 25-145 99-183Z" fill="#161312" opacity=".08"/>

  <g transform="translate(116 104)" fill="none">
