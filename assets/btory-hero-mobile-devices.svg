      <text x="28" y="48" fill="#161312" font-family="Arial Black, Helvetica, sans-serif" font-size="25" font-weight="900">Receipts</text>
      <rect x="28" y="78" width="94" height="78" rx="18" fill="#FFF0E4" stroke="#161312" stroke-width="4"/>
      <rect x="142" y="78" width="94" height="78" rx="18" fill="#FFF0E4" stroke="#161312" stroke-width="4"/>
      <rect x="48" y="102" width="52" height="10" rx="5" fill="#FF2D73"/>
      <rect x="162" y="102" width="52" height="10" rx="5" fill="#FFC154"/>
      <rect x="48" y="126" width="42" height="10" rx="5" fill="#161312" opacity=".7"/>
