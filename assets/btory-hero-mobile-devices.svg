    <rect x="1066" y="498" width="84" height="84" rx="22" fill="#FFF0E4" stroke="#FF2D73" stroke-width="5" stroke-dasharray="12 9"/>
    <rect x="1180" y="506" width="92" height="13" rx="7" fill="#161312"/>
    <rect x="1180" y="536" width="70" height="13" rx="7" fill="#FF2D73"/>
    <rect x="1180" y="566" width="82" height="13" rx="7" fill="#FFC154"/>
    <text x="1066" y="603" fill="#161312" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="800">Photo + barcode</text>

    <rect x="1034" y="656" width="276" height="122" rx="32" fill="#fff" stroke="#161312" stroke-width="5"/>
    <text x="1062" y="702" fill="#161312" font-family="Arial Black, Helvetica, sans-serif" font-size="24" font-weight="900">Order list</text>
    <rect x="1062" y="724" width="82" height="15" rx="8" fill="#FF2D73"/>
    <rect x="1160" y="724" width="54" height="15" rx="8" fill="#FFC154"/>
    <rect x="1230" y="724" width="44" height="15" rx="8" fill="#161312" opacity=".2"/>

    <g transform="translate(1034 812)">
      <rect width="276" height="82" rx="28" fill="#fff" stroke="#161312" stroke-width="5"/>
      <path d="M36 43l18 18 42-48" fill="none" stroke="#FF2D73" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="112" y="52" fill="#161312" font-family="Arial Black, Helvetica, sans-serif" font-size="24" font-weight="900">Received</text>
    </g>
    <circle cx="1090" cy="922" r="9" fill="#fff" stroke="#161312" stroke-width="4"/>
    <circle cx="1135" cy="922" r="9" fill="#fff" stroke="#161312" stroke-width="4"/>
    <rect x="1172" y="914" width="54" height="16" rx="8" fill="#FF2D73" stroke="#161312" stroke-width="4"/>
    <circle cx="1263" cy="922" r="9" fill="#fff" stroke="#161312" stroke-width="4"/>
